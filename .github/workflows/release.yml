name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - goarch: amd64
            deb_arch: amd64
          - goarch: arm64
            deb_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o mikrom \
            .

      - name: Create tar.gz
        run: |
          ARCHIVE="mikrom_${{ steps.version.outputs.VERSION }}_linux_${{ matrix.goarch }}.tar.gz"
          tar -czf "$ARCHIVE" mikrom LICENSE README.md
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Create .deb package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PKG="mikrom_${VERSION}_${{ matrix.deb_arch }}"
          mkdir -p "${PKG}/usr/local/bin"
          mkdir -p "${PKG}/DEBIAN"
          cp mikrom "${PKG}/usr/local/bin/mikrom"
          cat > "${PKG}/DEBIAN/control" <<EOF
          Package: mikrom
          Version: ${VERSION}
          Architecture: ${{ matrix.deb_arch }}
          Maintainer: Mikrom <noreply@mikrom.io>
          Description: Mikrom CLI
           Command-line interface for managing Firecracker microVMs via the Mikrom platform.
          EOF
          dpkg-deb --build --root-owner-group "${PKG}"
          echo "DEB=${PKG}.deb" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goarch }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.DEB }}
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.deb
